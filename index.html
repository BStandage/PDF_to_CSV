<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF → CSV</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Starfield ── */
    #stars-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #00001a;
      color: #dde6f0;
      min-height: 100vh;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }
    .mascot {
      width: 130px;
      image-rendering: auto;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 0 18px rgba(180,200,255,0.35));
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #c0d8ff, #e8d5ff, #a0cfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .subtitle {
      color: #7a90b0;
      margin-top: 0.4rem;
      font-size: 0.92rem;
    }

    /* ── Cards ── */
    .card {
      background: rgba(10, 18, 40, 0.82);
      border: 1px solid rgba(100, 140, 220, 0.18);
      border-radius: 1rem;
      padding: 1.5rem;
      max-width: 720px;
      margin: 0 auto 1.5rem;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 32px rgba(0,0,30,0.5);
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed rgba(100, 140, 220, 0.3);
      border-radius: 0.75rem;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #7eb3ff;
      background: rgba(80, 120, 220, 0.07);
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .upload-zone p { color: #8aa4c8; line-height: 1.6; }
    .upload-zone strong { color: #dde6f0; }
    input[type=file] { display: none; }

    /* ── Form ── */
    label.field { display: flex; flex-direction: column; gap: 0.35rem; }
    label.field span { font-size: 0.8rem; color: #7a90b0; }
    label.field input[type=text] {
      background: rgba(0,0,30,0.6);
      border: 1px solid rgba(100,140,220,0.25);
      border-radius: 0.5rem;
      color: #dde6f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      width: 100%;
    }
    label.field input[type=text]:focus { outline: none; border-color: #7eb3ff; }

    /* ── Progress ── */
    .progress-bar {
      background: rgba(0,0,30,0.6);
      border-radius: 9999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b6fd4, #a87de8, #3b6fd4);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      border-radius: 9999px;
      transition: width 0.25s ease;
      width: 0%;
    }
    @keyframes shimmer { 0%{background-position:0% 0} 100%{background-position:200% 0} }
    #progress-label { color: #7a90b0; font-size: 0.85rem; text-align: center; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      background: linear-gradient(135deg, #2a5bbf, #7b4fcf);
      border: none;
      border-radius: 0.5rem;
      color: #e8eeff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.7rem 1.75rem;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 12px rgba(80,120,255,0.3);
    }
    .btn:hover { opacity: 0.88; box-shadow: 0 0 20px rgba(80,120,255,0.5); }
    .btn-ghost { background: rgba(40,55,90,0.8); box-shadow: none; }

    /* ── Table ── */
    .stats { color: #5a7090; font-size: 0.8rem; text-align: center; margin-bottom: 0.75rem; }
    .preview-wrap {
      overflow: auto;
      max-height: 480px;
      border: 1px solid rgba(100,140,220,0.2);
      border-radius: 0.5rem;
    }
    table { border-collapse: collapse; width: max-content; min-width: 100%; font-size: 0.78rem; }
    th {
      background: rgba(20,35,70,0.95);
      color: #7eb3ff;
      padding: 0.5rem 0.75rem;
      position: sticky;
      top: 0;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid rgba(100,140,220,0.25);
    }
    td {
      padding: 0.35rem 0.75rem;
      border-bottom: 1px solid rgba(30,50,90,0.8);
      white-space: nowrap;
      color: #b8cce0;
    }
    tr:hover td { background: rgba(40,65,120,0.3); }
    .preview-note { text-align: center; padding: 0.6rem; color: #3a5070; font-size: 0.78rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div class="hero">
  <img src="monkey_dance.gif" alt="moon monkey" class="mascot">
  <h1>PDF → CSV</h1>
  <p class="subtitle">Runs entirely in your browser — no uploads, no server</p>
</div>

<div class="card" id="upload-card">
  <div class="upload-zone" id="drop-zone">
    <div class="upload-icon">📄</div>
    <p><strong>Drop a PDF here</strong> or click to choose a file</p>
    <p style="margin-top:0.4rem;font-size:0.82rem">Handles multi-page &amp; scanned PDFs</p>
  </div>
  <input type="file" id="file-input" accept=".pdf">
</div>

<div class="card hidden" id="options-card">
  <label class="field">
    <span>Column headers (comma-separated) — leave blank to use auto-detected columns</span>
    <input type="text" id="custom-headers" placeholder="e.g. Phone, Title, First Name, Last Name, Address, City, State, Zip">
  </label>
</div>

<div class="card hidden" id="progress-card">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="progress-label">Loading...</div>
</div>

<div class="card hidden" id="actions-card">
  <div class="btn-row">
    <button class="btn" id="download-btn">⬇ Download CSV</button>
    <button class="btn btn-ghost" id="reset-btn">Upload Another</button>
  </div>
</div>

<div class="card hidden" id="preview-card">
  <div class="stats" id="stats"></div>
  <div class="preview-wrap" id="preview"></div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  let gridData = [];
  let ocrWorker = null;

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => e.target.files[0] && handleFile(e.target.files[0]));
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f?.type === 'application/pdf') handleFile(f);
  });

  document.getElementById('download-btn').addEventListener('click', downloadCSV);
  document.getElementById('reset-btn').addEventListener('click', reset);
  document.getElementById('custom-headers').addEventListener('input', () => {
    if (gridData.length) showPreview(gridData);
  });

  // --- Main flow ---
  async function handleFile(file) {
    show('progress-card');
    hide('actions-card');
    hide('preview-card');
    hide('options-card');

    try {
      const buffer = await file.arrayBuffer();
      setProgress(2, `Loading ${file.name}…`);
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      gridData = await extractGrid(pdf);
      if (ocrWorker) { await ocrWorker.terminate(); ocrWorker = null; }
      show('options-card');
      show('actions-card');
      showPreview(gridData);
      show('preview-card');
      hide('progress-card');
    } catch (err) {
      setProgress(0, '❌ ' + err.message);
      console.error(err);
      if (ocrWorker) { await ocrWorker.terminate(); ocrWorker = null; }
    }
  }

  // --- PDF extraction with OCR fallback ---
  async function extractGrid(pdf) {
    const total = pdf.numPages;
    const allItems = []; // each item is a { text, x, y } phrase/cell

    for (let p = 1; p <= total; p++) {
      setProgress(5 + (p / total) * 80, `Page ${p} of ${total}…`);
      const page = await pdf.getPage(p);
      const vp = page.getViewport({ scale: 1 });
      const content = await page.getTextContent();
      const yOffset = (p - 1) * 100000;

      const textItems = content.items.filter(i => i.str.trim());

      if (textItems.length > 5) {
        // Native text: deskew via transform matrix angle, each item is already a word/token
        const raw = textItems.map(item => {
          const [a, b, , , e, f] = item.transform;
          return { text: item.str.trim(), rawX: e, rawY: vp.height - f, angle: Math.atan2(b, a) };
        });
        const skew = median(raw.map(i => i.angle));
        const cos = Math.cos(-skew), sin = Math.sin(-skew);
        for (const item of raw) {
          allItems.push({
            text: item.text,
            x: Math.round(item.rawX * cos - item.rawY * sin),
            y: yOffset + Math.round(item.rawX * sin + item.rawY * cos),
          });
        }
      } else {
        setProgress(5 + (p / total) * 80, `Page ${p} of ${total} (OCR)…`);
        // OCR path returns pre-merged phrases (not individual words)
        const phrases = await ocrPage(page, vp, p, total);
        for (const ph of phrases) {
          allItems.push({ text: ph.text, x: ph.x, y: yOffset + ph.y });
        }
      }
    }

    if (!allItems.length) throw new Error('No text could be extracted from this PDF.');

    setProgress(88, 'Detecting columns…');
    allItems.sort((a, b) => a.y - b.y || a.x - b.x);

    const rows = groupRows(allItems, 6);
    const colCenters = findColumns(allItems.map(i => i.x), 18);

    setProgress(93, 'Building grid…');

    const grid = rows.map(row => {
      const cells = new Array(colCenters.length).fill('');
      for (const item of row) {
        const ci = nearest(colCenters, item.x);
        cells[ci] = cells[ci] ? cells[ci] + ' ' + item.text : item.text;
      }
      return cells;
    }).filter(row => row.some(Boolean));

    const keep = colCenters.map((_, ci) => grid.some(row => row[ci]));
    return grid.map(row => row.filter((_, ci) => keep[ci]));
  }

  async function ocrPage(page, vp, pageNum, total) {
    const scale = 1.5;
    const scaledVp = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = scaledVp.width;
    canvas.height = scaledVp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: scaledVp }).promise;

    if (!ocrWorker) {
      setProgress(5 + (pageNum / total) * 80, 'Initializing OCR engine…');
      ocrWorker = await Tesseract.createWorker('eng', 1, {
        workerPath: 'https://unpkg.com/tesseract.js@5/dist/worker.min.js',
        langPath: 'https://tessdata.projectnaptha.com/4.0.0_fast',
        corePath: 'https://unpkg.com/tesseract.js-core@5/tesseract-core.wasm.js',
      });
    }

    const { data } = await ocrWorker.recognize(canvas);

    // Compute a dynamic column-gap threshold from all inter-word gaps on this page.
    // Gaps smaller than threshold = words in the same cell; larger = column boundary.
    const allGaps = [];
    for (const line of data.lines) {
      const ws = line.words.filter(w => w.text.trim()).sort((a, b) => a.bbox.x0 - b.bbox.x0);
      for (let i = 1; i < ws.length; i++) {
        const g = (ws[i].bbox.x0 - ws[i - 1].bbox.x1) / scale;
        if (g > 0) allGaps.push(g);
      }
    }
    allGaps.sort((a, b) => a - b);
    const medGap = allGaps.length ? allGaps[Math.floor(allGaps.length / 2)] : 6;
    // Column gaps are typically 3-6x the normal word spacing
    const colGapThreshold = Math.max(medGap * 3.5, 14);

    // Merge words into phrases per Tesseract line.
    // Using data.lines ensures words on the same visual row share the same y value,
    // preventing one logical row from fragmenting into multiple CSV rows.
    const phrases = [];
    for (const line of data.lines) {
      const ws = line.words.filter(w => w.text.trim()).sort((a, b) => a.bbox.x0 - b.bbox.x0);
      if (!ws.length) continue;

      const lineY = Math.round(line.bbox.y0 / scale);
      let cur = null;

      for (const w of ws) {
        const x0 = w.bbox.x0 / scale;
        const x1 = w.bbox.x1 / scale;
        const t  = w.text.trim();
        if (!cur) {
          cur = { text: t, x: x0, x1 };
        } else if (x0 - cur.x1 < colGapThreshold) {
          cur.text += ' ' + t;
          cur.x1 = x1;
        } else {
          phrases.push({ text: cur.text, x: Math.round(cur.x), y: lineY });
          cur = { text: t, x: x0, x1 };
        }
      }
      if (cur) phrases.push({ text: cur.text, x: Math.round(cur.x), y: lineY });
    }

    return phrases;
  }

  // --- Helpers ---
  function groupRows(items, tol) {
    const rows = [];
    let cur = [], refY = null;
    for (const item of items) {
      if (refY === null || Math.abs(item.y - refY) > tol) {
        if (cur.length) rows.push(cur);
        cur = [item];
        refY = item.y;
      } else {
        cur.push(item);
      }
    }
    if (cur.length) rows.push(cur);
    return rows;
  }

  function findColumns(xs, gap) {
    const sorted = [...new Set(xs)].sort((a, b) => a - b);
    const clusters = [];
    let cluster = [sorted[0]];
    for (let i = 1; i < sorted.length; i++) {
      if (sorted[i] - sorted[i - 1] > gap) { clusters.push(cluster); cluster = []; }
      cluster.push(sorted[i]);
    }
    clusters.push(cluster);
    return clusters.map(c => Math.round(c.reduce((a, b) => a + b, 0) / c.length));
  }

  function nearest(arr, val) {
    let bi = 0, bd = Math.abs(arr[0] - val);
    for (let i = 1; i < arr.length; i++) {
      const d = Math.abs(arr[i] - val);
      if (d < bd) { bd = d; bi = i; }
    }
    return bi;
  }

  function median(arr) {
    const s = [...arr].sort((a, b) => a - b);
    return s[Math.floor(s.length / 2)];
  }

  // --- CSV & preview ---
  function buildCSV(grid) {
    const customHdrs = document.getElementById('custom-headers').value.trim();
    const lines = [];
    if (customHdrs) lines.push(customHdrs);
    for (const row of grid) {
      lines.push(row.map(c => '"' + c.replace(/"/g, '""') + '"').join(','));
    }
    return lines.join('\r\n');
  }

  function showPreview(grid) {
    const customHdrs = document.getElementById('custom-headers').value.trim();
    const headers = customHdrs
      ? customHdrs.split(',').map(h => h.trim())
      : grid[0]?.map((_, i) => `Col ${i + 1}`) || [];
    const rows = grid;

    document.getElementById('stats').textContent =
      `${rows.length.toLocaleString()} rows × ${headers.length} columns`;

    const table = document.createElement('table');
    const thead = table.createTHead();
    const hrow = thead.insertRow();
    headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th); });

    const tbody = table.createTBody();
    const limit = Math.min(rows.length, 300);
    for (let i = 0; i < limit; i++) {
      const tr = tbody.insertRow();
      for (let j = 0; j < headers.length; j++) {
        tr.insertCell().textContent = rows[i][j] ?? '';
      }
    }

    const wrap = document.getElementById('preview');
    wrap.innerHTML = '';
    wrap.appendChild(table);
    if (rows.length > limit) {
      const note = document.createElement('p');
      note.className = 'preview-note';
      note.textContent = `Showing first ${limit} of ${rows.length.toLocaleString()} rows — all rows in download`;
      wrap.appendChild(note);
    }
  }

  function downloadCSV() {
    const blob = new Blob([buildCSV(gridData)], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'converted.csv'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function reset() {
    gridData = [];
    fileInput.value = '';
    document.getElementById('preview').innerHTML = '';
    document.getElementById('stats').textContent = '';
    document.getElementById('custom-headers').value = '';
    ['options-card','actions-card','preview-card','progress-card'].forEach(hide);
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
  function setProgress(pct, msg) {
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = msg;
  }

  // ── Starfield ──
  (function () {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars(n) {
      stars = Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2,
      }));
    }

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(280); });
    resize();
    initStars(280);
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
